<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-labelledby="title desc">
  <title id="title">PeakCan Host logo</title>
  <desc id="desc">Stylized CAN-bus waveform inside a connector-frame, PEAK orange + navy + signal cyan.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2A44"/>
      <stop offset="100%" stop-color="#0D1428"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0FB5C0"/>
      <stop offset="100%" stop-color="#5DD8E0"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#E27A00"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0FB5C0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0FB5C0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="192" ry="192" fill="url(#bg)"/>

  <!-- Connector frame (rounded square ring) -->
  <rect x="64" y="64" width="896" height="896" rx="160" ry="160"
        fill="none" stroke="url(#frame)" stroke-width="40"/>

  <!-- Inner subtle grid (CAN-bus grid feel) -->
  <g stroke="#243154" stroke-width="3" opacity="0.6">
    <line x1="160" y1="320" x2="864" y2="320"/>
    <line x1="160" y1="512" x2="864" y2="512"/>
    <line x1="160" y1="704" x2="864" y2="704"/>
  </g>

  <!-- Glow behind waveform -->
  <ellipse cx="512" cy="512" rx="380" ry="160" fill="url(#glow)"/>

  <!-- CAN waveform: rising-edge / recessive / falling-edge style -->
  <polyline points="160,512 280,512 320,360 360,664 400,360 440,664 480,512 560,512 600,360 640,664 680,360 720,512 864,512"
            fill="none" stroke="url(#wave)" stroke-width="56"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "P" / connector markers on left and right ends -->
  <circle cx="160" cy="512" r="28" fill="#5DD8E0"/>
  <circle cx="864" cy="512" r="28" fill="#5DD8E0"/>

  <!-- Small PEAK-orange accent dots (CAN nodes) -->
  <circle cx="240" cy="200" r="18" fill="#E27A00"/>
  <circle cx="784" cy="824" r="18" fill="#E27A00"/>
  <circle cx="320" cy="840" r="14" fill="#FFB347"/>
  <circle cx="704" cy="184" r="14" fill="#FFB347"/>
</svg>
